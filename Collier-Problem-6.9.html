<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riemann curvature tensory</title>
  <style>
    body {
      padding: 20px;
    }
    #output {
    	font-size: 28px;
		font-family:  Palatino;
    }
  </style>
</head>
<body>
  <h1>Riemann curvature tensor for the surface of a unit radius sphere</h1>
  <pre id="output"></pre>

  <script src="js/ChristoffelSymbol.js"></script>
  <script src="js/Riemann.js"></script>
  <script src="js/Riemann0sDropped.js"></script>
  <script>
	function indexToCoordinate(num) {
		const superscripts = ['θ', 'ϕ'];
		return superscripts[num];
	}

	let n = 1;
	let output = '';
	for (let h = 0; h < 2; h++) {
		for (let i = 0; i < 2; i++) {
			for (let j = 0; j < 2; j++) {
				for (let k = 0; k < 2; k++) {
					const riemann = new Riemann(h, i, j, k);
					ChristoffelSymbol.show0s = false;
					output += n++ + '.\t' + riemann + ' = ' + riemann.express() + '\n\n\t\t= ';
					ChristoffelSymbol.show0s = true;
					output += riemann.express() + '\n\n\t\t= ';
					output += new Riemann0sDropped(riemann) + '\n\n';
				}
			}
		}
	}
    document.getElementById('output').innerHTML = output;
  </script>
</body>
</html>
