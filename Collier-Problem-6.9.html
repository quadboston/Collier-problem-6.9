<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riemann curvature tensory</title>
  <style>
    body {
      padding: 20px;
    }
    #output {
      font-size: 24px;
	        font-family:  Palatino;
    }
  </style>
</head>
<body>
  <h1>Riemann curvature tensor for the surface of a unit radius sphere</h1>
  <pre id="output"></pre>

  <script>
	class ChristoffelSymbol {
	  constructor(upper, lower1, lower2) {
	    this.upper = upper;
	    this.lower1 = lower1;
	    this.lower2 = lower2;
	  }

	  toString() {
	    return '<math xmlns>' +
	      '<mmultiscripts>' +
	        '<mi>Γ</mi>' +
			'<mi>' + indexToCoordinate(this.lower1) + '</mi>' +
			'<mi>' + indexToCoordinate(this.upper) + '</mi>' +
	        '<mi>' + indexToCoordinate(this.lower2) + '</mi>' +
			'<none/>' +
	      '</mmultiscripts>' +
	    '</math>';
	  }
	}

	class Riemann {
		constructor(h, i, j, k) {
			this.h = h;
			this.i = i;
			this.j = j;
			this.k = k;
		}

		toString() {
			return '<math xmlns>' +
			'<mmultiscripts>' +
				'<mi>R</mi>' +
				'<mi>' + indexToCoordinate(this.i) + '</mi>' +
				'<mi>' + indexToCoordinate(this.h) + '</mi>' +
				'<mi>' + indexToCoordinate(this.j) + '</mi>' +
				'<none/>' +
				'<mi>' + indexToCoordinate(this.k) + '</mi>' +
				'<none/>' +
			'</mmultiscripts>' +
			'</math>';
		}
	}

	
	let n = 1;
	let output = '';
	for (let h = 0; h <= 1; h++) {
		for (let i = 0; i <= 1; i++) {
			for (let j = 0; j <= 1; j++) {
				for (let k = 0; k <= 1; k++) {
					output += n++ + '. ' + evaluate(createR(h, i, j, k)) + '\n\n';
				}
			}
		}
	}
    document.getElementById('output').innerHTML = output;



	function createR(h, i, j, k) {
		let riemann = new Riemann(h, i, j, k);
		let cs1 = new ChristoffelSymbol(h, i, k)
		return riemann;
	}


	function evaluate(expression) {
	  // This function would contain the logic to evaluate the expression.
	  // For now, it just returns the expression as a string.
	  return expression;
	}


	function indexToCoordinate(num) {
	  const superscripts = ['θ', 'ϕ'];
	  return superscripts[num];
	}

  </script>
</body>
</html>
